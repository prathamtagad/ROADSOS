<style>
        .emergency-pulse {
            animation: pulse-bg 2s infinite ease-in-out;
        }
        @keyframes pulse-bg {
            0% { background-color: rgba(183, 0, 17, 0.9); }
            50% { background-color: rgba(220, 38, 38, 1); }
            100% { background-color: rgba(183, 0, 17, 0.9); }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md overflow-hidden">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-mobile py-4 bg-surface dark:bg-surface-dim border-b-2 border-on-surface dark:border-on-surface-variant top-0 fixed z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="language">language</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-black text-primary dark:text-primary-fixed-dim">Thailand Status: Clear</h1>
</div>
<div class="active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="notifications">notifications</span>
</div>
</header>
<!-- Emergency Main Canvas -->
<main class="relative min-h-screen w-full flex flex-col items-center justify-center pt-20 pb-24 emergency-pulse px-margin-mobile">
<!-- Background Imagery for Context -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<img class="w-full h-full object-cover" data-alt="A dark and moody highway scene at night with motion blurred lights of emergency vehicles. The atmosphere is urgent and tense, dominated by deep shadows and intense streaks of emergency red light. The visual style is gritty and cinematic, emphasizing high contrast and a sense of immediate crisis, perfectly aligning with the bold emergency response UI palette." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDHV8omdt2BK1qpZvB_oC15gA7GI-LiI0S4L87wJzmpAHAp3vB6chM3CsEs-M87D9JIHt1vTcgyR6DE_cwqvdLLFsaxHQ-STa9RFWcS0dw0PUqU32ZiW4ldSNcFRzLtF9Bs4sSNYR80wD6Dt_ZoCqyLgFhCIx8J1eObqbH0M0xfvyR48lgJTSTi48og41ZsiXEOxhwwDl8wwmgFg2yc8ZcuW87F007IipIc6QgdfsgFSsSpb_r59D3z0SPDHzGvnpk0vJyhv86eBdU5"/>
</div>
<!-- Countdown Section -->
<section class="relative z-10 flex flex-col items-center text-center space-y-stack-md">
<div class="flex flex-col items-center justify-center w-64 h-64 border-8 border-white rounded-full bg-black/30 backdrop-blur-md shadow-2xl">
<span class="font-headline-xl text-[120px] text-white leading-none">10</span>
<span class="font-label-caps text-white mt-2">SECONDS UNTIL DISPATCH</span>
</div>
<div class="bg-white/10 backdrop-blur-sm border-2 border-white px-6 py-4 rounded-xl max-w-sm">
<div class="flex items-center justify-center gap-2 mb-2">
<span class="material-symbols-outlined text-white" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
<p class="font-body-xl text-white">Location sharing active</p>
</div>
<p class="font-body-md text-white/90">Shared with Family &amp; Emergency Services</p>
</div>
</section>
<!-- Cancel Action -->
<section class="relative z-10 w-full max-w-md mt-stack-lg flex flex-col gap-stack-sm">
<button class="w-full h-[120px] bg-white border-4 border-black active:scale-95 transition-all flex flex-col items-center justify-center shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
<span class="font-headline-lg text-black">CANCEL</span>
<span class="font-label-caps text-on-surface-variant">PIN REQUIRED TO ABORT</span>
</button>
</section>
<!-- AI Insights Banner -->
<div class="fixed bottom-24 left-margin-mobile right-margin-mobile z-20">
<div class="bg-warning-yellow border-2 border-black p-4 flex items-start gap-4 shadow-xl">
<span class="material-symbols-outlined text-black shrink-0" data-icon="medical_services" style="font-variation-settings: 'FILL' 1;">medical_services</span>
<div class="flex flex-col">
<span class="font-label-caps text-black">AI FIRST AID INSIGHT</span>
<p class="font-body-xl text-black leading-tight">Maintain open airway. Check for pulse.</p>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface dark:bg-surface-dim border-t-2 border-on-surface dark:border-on-surface-variant">
<div class="flex flex-col items-center justify-center bg-primary text-on-primary rounded-xl px-4 py-2 active:scale-90 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="emergency" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-label-caps text-label-caps">SOS</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-primary-container hover:text-on-primary-container active:scale-90 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="support_agent">support_agent</span>
<span class="font-label-caps text-label-caps">Assist</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-primary-container hover:text-on-primary-container active:scale-90 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-label-caps text-label-caps">Map</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-primary-container hover:text-on-primary-container active:scale-90 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-caps text-label-caps">Profile</span>
</div>
</nav>
</body></html>
